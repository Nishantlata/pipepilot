trigger:
- main

pool:
  name: charlie-pool



stages:

- stage: initialise
  displayName: Terraform init
  
  jobs:
  - job: init
    steps:

    - checkout: self
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: '$(workingDirectory)'
        backendServiceArm: 'ci_scn'
        backendAzureRmResourceGroupName: 'backendrg1'
        backendAzureRmStorageAccountName: 'backendstg10'
        backendAzureRmContainerName: 'backendcnt10'
        backendAzureRmKey: 'ci.tfstate'
