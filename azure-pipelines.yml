trigger:
  branches:
    include:
      - main

pool:
  name: charlie-pool

variables:
  workingDirectory: terraform
  tfvarsFile: environments/dev/terraform.tfvars
  planFile: tfplan

stages:

############################################################
# Stage-1
############################################################

- stage: Terraform_Validate
  displayName: Terraform Validation

  jobs:

  - job: Validate

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.8.5'

    - script: |
        terraform init
      workingDirectory: $(workingDirectory)
      displayName: Terraform Init

    - script: |
        terraform fmt -recursive -check
      workingDirectory: $(workingDirectory)
      displayName: Terraform Fmt

    - script: |
        terraform validate
      workingDirectory: $(workingDirectory)
      displayName: Terraform Validate

############################################################
# Stage-2
############################################################

- stage: TFSec

  dependsOn: Terraform_Validate

  jobs:

  - job: SecurityScan

    steps:

    - checkout: self

    - script: |
        choco install tfsec -y
      displayName: Install tfsec

    - script: |
        tfsec $(workingDirectory) --format junit --out tfsec-report.xml
      displayName: Run tfsec

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: tfsec-report.xml
        failTaskOnFailedTests: true

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: tfsec-report.xml
        artifact: tfsec-report

############################################################
# Stage-3
############################################################

- stage: Terraform_Plan

  dependsOn: TFSec

  jobs:

  - job: Plan

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.8.5'

    - script: |
        terraform init
      workingDirectory: $(workingDirectory)

    - script: |
        terraform plan \
        -var-file=$(tfvarsFile) \
        -out=$(planFile)
      workingDirectory: $(workingDirectory)
      displayName: Terraform Plan

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: $(workingDirectory)/$(planFile)
        artifact: terraform-plan

############################################################
# Stage-4
############################################################

- stage: Unit_Test

  dependsOn: Terraform_Plan

  jobs:

  - job: UnitTest

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.8.5'

    - script: |
        terraform init
      workingDirectory: $(workingDirectory)

    - script: |
        terraform test
      workingDirectory: $(workingDirectory)
      displayName: Terraform Unit Test

############################################################
# Stage-5
############################################################

- stage: Manual_Approval

  dependsOn: Unit_Test

  jobs:

  - job: WaitForApproval

    pool: server

    steps:

    - task: ManualValidation@0
      timeoutInMinutes: 1440
      inputs:
        notifyUsers: ''
        instructions: |
          Please review Terraform Plan before Apply.
        onTimeout: reject

############################################################
# Stage-6
############################################################

- stage: Terraform_Apply

  dependsOn: Manual_Approval

  jobs:

  - job: Apply

    steps:

    - checkout: self

    - download: current
      artifact: terraform-plan

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.8.5'

    - script: |
        terraform init
      workingDirectory: $(workingDirectory)

    - script: |
        terraform apply -auto-approve "$(Pipeline.Workspace)/terraform-plan/$(planFile)"
      workingDirectory: $(workingDirectory)
      displayName: Terraform Apply