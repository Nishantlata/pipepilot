trigger:
- main

pool:
  name: charlie-pool

variables:
  workingDirectory: terraform
  tfvarsFile: environments/dev/terraform.tfvars
  planFile: tfplan
  terraformVersion: 1.8.5

stages:

#========================================================
# VALIDATE
#========================================================

- stage: Validate

  jobs:

  - job: Validate

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: AzureCLI@2
      displayName: Terraform Init
      inputs:
        azureSubscription: ci_scn
        scriptType: ps
        scriptLocation: inlineScript
        workingDirectory: $(workingDirectory)
        inlineScript: |
          terraform init

    - script: terraform fmt -recursive -check
      workingDirectory: $(workingDirectory)

    - script: terraform validate
      workingDirectory: $(workingDirectory)

#========================================================
# TFSEC
#========================================================

- stage: Security

  dependsOn: Validate

  jobs:

  - job: tfsec

    steps:

    - checkout: self

    - powershell: |
        choco install tfsec -y
      displayName: Install tfsec

    - powershell: |
        tfsec $(workingDirectory) --format junit --out tfsec.xml
      displayName: Run tfsec

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: tfsec.xml

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: tfsec.xml
        artifact: tfsec-report

#========================================================
# PLAN
#========================================================

- stage: Plan

  dependsOn: Security

  jobs:

  - job: Plan

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: AzureCLI@2
      displayName: Terraform Plan
      inputs:
        azureSubscription: ci_scn
        scriptType: ps
        scriptLocation: inlineScript
        workingDirectory: $(workingDirectory)
        inlineScript: |
          terraform init
          terraform plan -var-file=$(tfvarsFile) -out=$(planFile)

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: $(workingDirectory)/$(planFile)
        artifact: terraform-plan

#========================================================
# UNIT TEST
#========================================================

- stage: UnitTest

  dependsOn: Plan

  jobs:

  - job: UnitTest

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - script: |
        terraform init
        terraform test
      workingDirectory: $(workingDirectory)

#========================================================
# MANUAL APPROVAL
#========================================================

- stage: Approval

  dependsOn: UnitTest

  jobs:

  - job: Manual

    pool: server

    steps:

    - task: ManualValidation@0
      timeoutInMinutes: 1440
      inputs:
        notifyUsers: ""
        instructions: "Review Terraform Plan before Apply"
        onTimeout: reject

#========================================================
# APPLY
#========================================================

- stage: Apply

  dependsOn: Approval

  jobs:

  - job: Apply

    steps:

    - checkout: self

    - download: current
      artifact: terraform-plan

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: AzureCLI@2
      displayName: Terraform Apply
      inputs:
        azureSubscription: ci_scn
        scriptType: ps
        scriptLocation: inlineScript
        workingDirectory: $(workingDirectory)
        inlineScript: |
          terraform init
          terraform apply -auto-approve "$(Pipeline.Workspace)\terraform-plan\$(planFile)"