trigger:
- main

pool:
  name: charlie-pool



stages:

- stage: initialise
  displayName: Terraform init
  
  jobs:
  - job: init
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.8.5'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: '$(Build.SourcesDirectory)/terraform'
        backendServiceArm: 'cicd_scn'
        backendAzureRmResourceGroupName: 'backendrg1'
        backendAzureRmStorageAccountName: 'backendstg10'
        backendAzureRmContainerName: 'backendcnt10'
        backendAzureRmKey: 'ci.tfstate'
